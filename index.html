<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progres Donasi Asrama Putri</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f4f6f9; 
            color: #333; 
        }
        .donation-box { 
            max-width: 500px; 
            margin: 50px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.4rem; }
        .stats { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-weight: 600; 
            font-size: 1.1rem; 
        }
        .target { color: #7f8c8d; text-align: right; }
        .terkumpul { color: #2ecc71; }
        .label-text { font-size: 0.85rem; color: #7f8c8d; display: block; margin-bottom: 2px; }
        
        /* Desain Progress Bar */
        .progress-container { 
            background: #e0e0e0; 
            border-radius: 20px; 
            height: 20px; 
            width: 100%; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        .progress-bar { 
            background: linear-gradient(90deg, #2ecc71, #27ae60); 
            height: 100%; 
            width: 0%; 
            border-radius: 20px; 
            transition: width 0.8s ease-in-out; 
        }
        
        .percentage { font-weight: bold; color: #34495e; font-size: 1rem; }
        .status-text { font-size: 0.85rem; color: #95a5a6; font-style: italic; }
    </style>
</head>
<body>

<div class="donation-box">
    <h2>Donasi Pembangunan Asrama Putri</h2>
    
    <div class="stats">
        <div>
            <span class="label-text">Terkumpul</span>
            <span id="text-terkumpul" class="terkumpul">Rp 0</span>
        </div>
        <div class="target">
            <span class="label-text">Target</span>
            <span id="text-target">Rp 0</span>
        </div>
    </div>

    <!-- Komponen Progress Bar -->
    <div class="progress-container">
        <div id="fill" class="progress-bar"></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span id="pct" class="percentage">0% Terkumpul</span>
        <span id="status-koneksi" class="status-text">Menghubungkan ke Firebase...</span>
    </div>
</div>

<!-- SCRIPT FIREBASE SDK STABLE v10 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // Konfigurasi Project sesuai parameter dari Firebase Anda
  const firebaseConfig = {
      apiKey: "AIzaSyDaQXGJi1N_o4qulWyne1t-VBsFe5YKqCs",
      authDomain: "donasi-727e7.firebaseapp.com",
      projectId: "donasi-727e7",
      storageBucket: "donasi-727e7.firebasestorage.app",
      messagingSenderId: "1009738505362",
      appId: "1:1009738505362:web:f0872eb9a6545583d3da4b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Fungsi mengubah angka mentah menjadi format mata uang Rupiah
  const formatRupiah = (angka) => {
      return new Intl.NumberFormat('id-ID', {
          style: 'currency',
          currency: 'IDR',
          minimumFractionDigits: 0
      }).format(angka);
  };

  // Referensi ke Koleksi "campaigns" dan Dokumen "asrama_putri" sesuai image_68a63a.png
  const campaignRef = doc(db, "campaigns", "asrama_putri");

  // Mendengarkan perubahan data secara Realtime
  onSnapshot(campaignRef, (docSnap) => {
      const statusEl = document.getElementById('status-koneksi');
      
      if (docSnap.exists()) {
          const data = docSnap.data();
          
          // Number() memastikan string angka/int64 dari database terbaca sebagai objek Matematika
          const terkumpul = Number(data.terkumpul) || 0;
          const target = Number(data.target) || 1; 
          
          // Hitung persentase murni
          let persen = (terkumpul / target) * 100;
          
          // Batasi lebar visual Progress Bar agar mentok maksimal 100% jika donasi surplus
          let persenBar = persen;
          if (persenBar > 100) persenBar = 100; 

          // Ubah format titik desimal menjadi koma khas Indonesia (cth: 85,5%)
          let teksPersen = parseFloat(persen.toFixed(1)).toString().replace('.', ',');

          // Perbarui struktur tampilan HTML secara otomatis
          document.getElementById('text-terkumpul').innerText = formatRupiah(terkumpul);
          document.getElementById('text-target').innerText = formatRupiah(target);
          document.getElementById('pct').innerText = teksPersen + "% Terkumpul";
          document.getElementById('fill').style.width = persenBar + "%";
          
          statusEl.innerText = "Koneksi Terhubung";
          statusEl.style.color = "#2ecc71";
      } else {
          statusEl.innerText = "Error: Dokumen tidak ditemukan";
          statusEl.style.color = "#e74c3c";
          console.error("Dokumen 'asrama_putri' tidak ada di database.");
      }
  }, (error) => {
      const statusEl = document.getElementById('status-koneksi');
      statusEl.innerText = "Akses Database Ditolak";
      statusEl.style.color = "#e74c3c";
      console.error("Firebase Security Rules Error:", error.message);
  });
</script>

</body>
</html>
